<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Style Remover</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');

        :root {
            --blue-darkest: #0E142C;
            --blue-darker: #081636;
            --blue-dark: #0F2042;
            --vast-blue: #1FD9FE;
            --vast-blue-darker: #18A3D1;
            --vast-gold: #FFBC42;
            --vast-gold-darker: #FFA600;
            --green: #06D69F;
            --green-darker: #049A72;
            --warm-white: #FAF7F7;
            --cool-white: #F2F2F7;
        }

        body {
            font-family: 'Moderat', 'Inter', Arial, sans-serif;
            margin: 20px;
            background: linear-gradient(135deg, var(--blue-darker) 0%, var(--blue-darkest) 100%);
            color: var(--warm-white);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--blue-dark);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.4);
            border: 1px solid rgba(31, 217, 254, 0.1);
        }
        
        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(31, 217, 254, 0.02);
            border-left: 4px solid var(--vast-blue);
            border-radius: 4px;
        }
        
        h1 {
            color: var(--warm-white);
            text-align: center;
            margin-bottom: 30px;
            font-weight: 700;
            letter-spacing: 0.02em;
            font-size: 32px;
            text-shadow: 0 0 20px rgba(31, 217, 254, 0.1);
        }
        
        h2 {
            color: var(--warm-white);
            border-bottom: 2px solid var(--vast-blue);
            padding-bottom: 10px;
            font-weight: 700;
            font-size: 24px;
        }
        
        h3 {
            color: var(--warm-white);
            margin-top: 0;
            font-size: 18px;
            font-weight: 600;
        }
        
        textarea {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 2px solid var(--vast-blue-darker);
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            resize: vertical;
            box-sizing: border-box;
            background-color: var(--blue-darkest);
            color: var(--vast-blue);
            transition: all 0.3s ease;
        }
        
        textarea:focus {
            outline: none;
            border-color: var(--vast-gold);
            box-shadow: 0 0 0 2px rgba(31, 217, 254, 0.2);
        }
        
        textarea::placeholder {
            color: rgba(31, 217, 254, 0.5);
        }
        
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0;
        }
        
        button {
            background: linear-gradient(135deg, var(--vast-blue) 0%, var(--vast-blue-darker) 100%);
            color: var(--blue-darkest);
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-family: 'Moderat', 'Inter', Arial, sans-serif;
            font-weight: 700;
            margin: 5px;
            transition: all 0.3s ease;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(31, 217, 254, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: transparent;
            color: var(--vast-blue);
            border: 1px solid var(--vast-blue);
        }
        
        .btn-secondary:hover {
            background: var(--vast-blue);
            color: var(--blue-darkest);
            box-shadow: 0 8px 16px rgba(31, 217, 254, 0.2);
        }
        
        .btn-success {
            background: linear-gradient(135deg, var(--vast-gold) 0%, var(--vast-gold-darker) 100%);
            color: var(--blue-darkest);
        }
        
        .btn-success:hover {
            box-shadow: 0 8px 16px rgba(255, 188, 66, 0.4);
            transform: translateY(-2px);
        }
        
        .stats {
            background: linear-gradient(135deg, rgba(31, 217, 254, 0.05) 0%, rgba(255, 188, 66, 0.03) 100%);
            border: 1px solid var(--vast-blue-darker);
            padding: 15px;
            border-radius: 4px;
            margin: 10px 0;
            font-family: 'Courier New', monospace;
            color: var(--vast-blue);
            font-size: 13px;
            line-height: 1.8;
        }
        
        .stats strong {
            color: var(--vast-gold);
            font-weight: 700;
        }
        
        .options {
            background: rgba(255, 188, 66, 0.08);
            border: 2px solid var(--vast-gold);
            padding: 15px;
            border-radius: 4px;
            margin: 15px 0;
        }
        
        .option-group {
            margin: 12px 0;
            display: flex;
            align-items: center;
        }
        
        label {
            margin-left: 8px;
            cursor: pointer;
            color: var(--warm-white);
            font-weight: 500;
            transition: color 0.2s ease;
        }
        
        label:hover {
            color: var(--vast-gold);
        }
        
        input[type="checkbox"] {
            margin-right: 8px;
            accent-color: var(--vast-gold);
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        .input-tabs {
            display: flex;
            gap: 0;
            margin-bottom: -2px;
            position: relative;
            z-index: 1;
        }

        .tab-btn {
            background: transparent;
            color: var(--vast-blue);
            border: 2px solid var(--vast-blue-darker);
            border-bottom: none;
            border-radius: 4px 4px 0 0;
            padding: 8px 20px;
            font-size: 13px;
            font-weight: 600;
            margin: 0 4px 0 0;
            cursor: pointer;
            transform: none !important;
            box-shadow: none !important;
            transition: background 0.2s, color 0.2s;
        }

        .tab-btn:hover {
            background: rgba(31, 217, 254, 0.1);
        }

        .tab-btn.active {
            background: var(--vast-blue);
            color: var(--blue-darkest);
            border-color: var(--vast-blue);
        }

        .url-input-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
            padding: 12px;
            background: var(--blue-darkest);
            border: 2px solid var(--vast-blue-darker);
            border-radius: 0 4px 4px 4px;
        }

        .url-input-row input[type="text"] {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--vast-blue-darker);
            border-radius: 4px;
            background: var(--blue-darker);
            color: var(--warm-white);
            font-family: 'Moderat', Arial, sans-serif;
            font-size: 13px;
            transition: border-color 0.3s;
        }

        .url-input-row input[type="text"]:focus {
            outline: none;
            border-color: var(--vast-blue);
            box-shadow: 0 0 0 2px rgba(31, 217, 254, 0.2);
        }

        .url-input-row input[type="text"]::placeholder {
            color: rgba(31, 217, 254, 0.4);
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            h2 {
                font-size: 20px;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            button {
                width: 100%;
                margin: 5px 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧹 HTML Style Code Remover</h1>
        
        <div class="section">
            <h2>Input HTML</h2>
            <div class="input-tabs">
                <button class="tab-btn active" onclick="switchTab('paste')">📋 Paste</button>
                <button class="tab-btn" onclick="switchTab('url')">🔗 URL</button>
            </div>
            <div id="urlInputRow" class="url-input-row" style="display:none;">
                <input type="text" id="urlInput" placeholder="https://example.com/page.html">
                <button onclick="fetchFromUrl()">⬇️ Fetch</button>
            </div>
            <textarea id="inputHtml" placeholder="Paste your HTML code here..."></textarea>
            
            <div class="options">
                <h3>Removal Options:</h3>
                <div class="option-group">
                    <input type="checkbox" id="removeStyleAttr" checked>
                    <label for="removeStyleAttr">Remove inline style attributes</label>
                </div>
                <div class="option-group">
                    <input type="checkbox" id="removeStyleTags" checked>
                    <label for="removeStyleTags">Remove &lt;style&gt; tags and content</label>
                </div>
                <div class="option-group">
                    <input type="checkbox" id="removeClassAttr">
                    <label for="removeClassAttr">Remove class attributes</label>
                </div>
                <div class="option-group">
                    <input type="checkbox" id="removeCssFiles">
                    <label for="removeCssFiles">Remove CSS file references (&lt;link&gt; tags)</label>
                </div>
                <div class="option-group">
                    <input type="checkbox" id="preserveFormatting" checked>
                    <label for="preserveFormatting">Preserve HTML formatting</label>
                </div>
            </div>
            
            <div class="button-group">
                <button onclick="processHtml()">🧹 Remove Style Code</button>
                <button onclick="clearAll()" class="btn-secondary">🗑️ Clear All</button>
                <button onclick="loadSample()" class="btn-secondary">📝 Load Sample</button>
            </div>
        </div>
        
        <div class="section">
            <h2>Statistics</h2>
            <div id="stats" class="stats">
                No processing done yet
            </div>
        </div>
        
        <div class="section">
            <h2>Cleaned HTML</h2>
            <textarea id="outputHtml" placeholder="Cleaned HTML will appear here..." readonly></textarea>
            <div class="button-group">
                <button onclick="copyToClipboard()" class="btn-success">📋 Copy to Clipboard</button>
                <button onclick="downloadHtml()" class="btn-success">💾 Download HTML</button>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            const urlRow = document.getElementById('urlInputRow');
            const tabs = document.querySelectorAll('.tab-btn');
            tabs[0].classList.toggle('active', tab === 'paste');
            tabs[1].classList.toggle('active', tab === 'url');
            urlRow.style.display = tab === 'url' ? 'flex' : 'none';
        }

        async function fetchFromUrl() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) { alert('Please enter a URL.'); return; }
            const btn = event.target;
            const orig = btn.textContent;
            btn.textContent = '⏳ Fetching...';
            btn.disabled = true;
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const html = await res.text();
                const ta = document.getElementById('inputHtml');
                ta.value = html;
                ta.style.height = 'auto';
                ta.style.height = Math.max(200, ta.scrollHeight) + 'px';
            } catch (e) {
                alert(`Failed to fetch URL.\n\nMost sites block cross-origin requests (CORS). Try pasting the HTML directly instead.\n\nError: ${e.message}`);
            } finally {
                btn.textContent = orig;
                btn.disabled = false;
            }
        }

        function removeStyleCode(htmlString, options = {}) {
            const {
                removeStyleAttr = true,
                removeStyleTags = true,
                removeClassAttr = false,
                removeCssFiles = false,
                preserveFormatting = true
            } = options;
            
            let processed = htmlString;
            let removedCount = 0;
            
            // Create a temporary DOM for processing
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = processed;
            
            // Remove inline style attributes
            if (removeStyleAttr) {
                const elementsWithStyle = tempDiv.querySelectorAll('[style]');
                removedCount += elementsWithStyle.length;
                elementsWithStyle.forEach(element => {
                    element.removeAttribute('style');
                });
            }
            
            // Remove <style> tags and their content
            if (removeStyleTags) {
                const styleTags = tempDiv.querySelectorAll('style');
                removedCount += styleTags.length;
                styleTags.forEach(tag => tag.remove());
            }
            
            // Remove class attributes
            if (removeClassAttr) {
                const elementsWithClass = tempDiv.querySelectorAll('[class]');
                removedCount += elementsWithClass.length;
                elementsWithClass.forEach(element => {
                    element.removeAttribute('class');
                });
            }
            
            // Remove CSS file references
            if (removeCssFiles) {
                const linkTags = tempDiv.querySelectorAll('link[rel="stylesheet"], link[type="text/css"]');
                removedCount += linkTags.length;
                linkTags.forEach(tag => tag.remove());
            }
            
            processed = tempDiv.innerHTML;
            
            // Optional: Clean up excessive whitespace while preserving structure
            if (!preserveFormatting) {
                processed = processed
                    .replace(/\s+/g, ' ')
                    .replace(/>\s+</g, '><')
                    .trim();
            }
            
            return {
                cleanedHtml: processed,
                removedCount: removedCount,
                originalLength: htmlString.length,
                cleanedLength: processed.length,
                spaceSaved: htmlString.length - processed.length
            };
        }
        
        function processHtml() {
            const inputHtml = document.getElementById('inputHtml').value;
            
            if (!inputHtml.trim()) {
                alert('Please paste some HTML code first!');
                return;
            }
            
            const options = {
                removeStyleAttr: document.getElementById('removeStyleAttr').checked,
                removeStyleTags: document.getElementById('removeStyleTags').checked,
                removeClassAttr: document.getElementById('removeClassAttr').checked,
                removeCssFiles: document.getElementById('removeCssFiles').checked,
                preserveFormatting: document.getElementById('preserveFormatting').checked
            };
            
            const result = removeStyleCode(inputHtml, options);
            
            document.getElementById('outputHtml').value = result.cleanedHtml;
            
            const reductionPercent = ((result.spaceSaved / result.originalLength) * 100).toFixed(1);
            
            document.getElementById('stats').innerHTML = `
                <strong>Processing Complete!</strong><br>
                • Style elements removed: ${result.removedCount}<br>
                • Original size: ${result.originalLength.toLocaleString()} characters<br>
                • Cleaned size: ${result.cleanedLength.toLocaleString()} characters<br>
                • Space saved: ${result.spaceSaved.toLocaleString()} characters (${reductionPercent}% reduction)
            `;
        }
        
        function clearAll() {
            document.getElementById('inputHtml').value = '';
            document.getElementById('outputHtml').value = '';
            document.getElementById('stats').innerHTML = 'No processing done yet';
        }
        
        function loadSample() {
            const sampleHtml = `<div style="background-color: #f0f0f0; padding: 20px; border: 1px solid #ccc;">
    <h1 style="color: #333; font-size: 24px; margin-bottom: 10px;" class="main-title">Sample Document</h1>
    <style>
        .highlight { background-color: yellow; }
        .bold { font-weight: bold; }
    </style>
    <p style="color: #666; line-height: 1.5;" class="content">This is a <span style="font-weight: bold; color: red;" class="highlight bold">sample paragraph</span> with lots of inline styles.</p>
    <link rel="stylesheet" href="styles.css">
    <ul style="list-style-type: disc; margin-left: 20px;">
        <li style="margin-bottom: 5px;" class="list-item">Item 1</li>
        <li style="margin-bottom: 5px;" class="list-item">Item 2</li>
    </ul>
</div>`;
            
            document.getElementById('inputHtml').value = sampleHtml;
        }
        
        function copyToClipboard() {
            const outputHtml = document.getElementById('outputHtml');
            if (!outputHtml.value) {
                alert('No cleaned HTML to copy!');
                return;
            }
            
            outputHtml.select();
            document.execCommand('copy');
            
            // Show feedback
            const button = event.target;
            const originalText = button.textContent;
            button.textContent = '✅ Copied!';
            setTimeout(() => {
                button.textContent = originalText;
            }, 2000);
        }
        
        function downloadHtml() {
            const outputHtml = document.getElementById('outputHtml').value;
            if (!outputHtml) {
                alert('No cleaned HTML to download!');
                return;
            }
            
            const blob = new Blob([outputHtml], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'cleaned-html.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        
        // Auto-resize textareas
        document.addEventListener('DOMContentLoaded', function() {
            const textareas = document.querySelectorAll('textarea');
            textareas.forEach(textarea => {
                textarea.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = Math.max(200, this.scrollHeight) + 'px';
                });
            });
        });
    </script>
</body>
</html>
